# ============================================================
# 로컬 개발 전용 Docker Compose — 인프라 only (앱 컨테이너화 없음)
# 앱(shop-core, notification)은 IDE에서 localhost로 직접 실행한다.
# 운영 자격증명이 아님. 실제 .env는 커밋하지 말 것(.gitignore 등록).
# ============================================================
# 서비스 7개: shop-core-postgres / shop-notification-postgres / shop-kafka (KRaft) / shop-kafka-ui / shop-redis / shop-search / shop-search-ui
# ZooKeeper 없음: Kafka 3.5 deprecated, 4.0 제거된 레거시이므로 KRaft 채택.
# ============================================================

services:

  # ----------------------------------------------------------
  # shop-core 전용 PostgreSQL (호스트 5432)
  # 앱 접속: jdbc:postgresql://localhost:5432/shop_core
  # ----------------------------------------------------------
  shop-core-postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16.4-alpine}
    container_name: shop-core-postgres
    environment:
      TZ: Asia/Seoul                                      # 컨테이너 시간대 KST(로그·now() 기준)
      POSTGRES_DB: ${SHOP_CORE_DB_NAME:-shop_core}        # 로컬 기본값 — 운영 아님
      POSTGRES_USER: ${SHOP_CORE_DB_USER:-shop_core}      # 로컬 기본값 — 운영 아님
      POSTGRES_PASSWORD: ${SHOP_CORE_DB_PASSWORD:-shop_core}  # 로컬 기본값 — 운영 아님
    ports:
      - "${SHOP_CORE_DB_PORT:-5432}:5432"
    volumes:
      - shop-core-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${SHOP_CORE_DB_USER:-shop_core}", "-d", "${SHOP_CORE_DB_NAME:-shop_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shop-net
    restart: unless-stopped  # Docker 시작 시 자동 기동(수동 docker stop은 존중)

  # ----------------------------------------------------------
  # notification 전용 PostgreSQL (호스트 5433 → 컨테이너 5432)
  # 앱 접속: jdbc:postgresql://localhost:5433/notification
  # ----------------------------------------------------------
  shop-notification-postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16.4-alpine}
    container_name: shop-notification-postgres
    environment:
      TZ: Asia/Seoul                                            # 컨테이너 시간대 KST(로그·now() 기준)
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notification}        # 로컬 기본값 — 운영 아님
      POSTGRES_USER: ${NOTIFICATION_DB_USER:-notification}      # 로컬 기본값 — 운영 아님
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-notification}  # 로컬 기본값 — 운영 아님
    ports:
      - "${NOTIFICATION_DB_PORT:-5433}:5432"
    volumes:
      - notification-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${NOTIFICATION_DB_USER:-notification}", "-d", "${NOTIFICATION_DB_NAME:-notification}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shop-net
    restart: unless-stopped  # Docker 시작 시 자동 기동(수동 docker stop은 존중)

  # ----------------------------------------------------------
  # Kafka KRaft 단일 노드 (broker + controller 겸임)
  # 호스트 게시: 9092 (EXTERNAL) — 앱이 localhost:9092로 접속
  # 미게시: 9093 (CONTROLLER 쿼럼 내부), 29092 (INTERNAL 컨테이너간)
  # ZooKeeper 없음 / depends_on 없음 (자체 컨트롤러 쿼럼 부트스트랩)
  # cluster id: apache/kafka:3.8.1 이미지가 자동 포맷(후보 A) — KAFKA_CLUSTER_ID 불필요
  # ----------------------------------------------------------
  shop-kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-3.8.1}
    container_name: shop-kafka
    environment:
      TZ: Asia/Seoul                          # 컨테이너 시간대 KST(로그 타임스탬프 기준)
      # KRaft 역할: 단일 노드에서 broker + controller 겸임
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      # 컨트롤러 쿼럼: 자기 자신(1@shop-kafka:9093) — 외부 의존 없음
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@shop-kafka:9093

      # 리스너 3종 분리
      # CONTROLLER: KRaft 메타데이터 쿼럼 전용 (클라이언트 접근 불가)
      # INTERNAL:   컨테이너 간 브로커 통신 (호스트 미게시)
      # EXTERNAL:   호스트 IDE 앱 접속용 (localhost:9092)
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://shop-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # 단일 브로커 필수: replication factor = 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 로컬 편의: 토픽 자동 생성 허용 (운영에서는 false 권장)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # KAFKA_CLUSTER_ID: 미설정 — apache/kafka:3.8.1 이미지가 첫 기동 시
      #   메타데이터 로그 디렉터리를 자동 포맷(cluster id 자동 생성)하는 것을 확인(후보 A).
      #   자동 포맷이 실패하면 후보 B: 아래 주석을 해제하고 .env에 KAFKA_CLUSTER_ID를 추가.
      # KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}

    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
      # 9093(CONTROLLER), 29092(INTERNAL)은 컨테이너 네트워크 전용 — 호스트 미게시
    networks:
      - shop-net
    restart: unless-stopped  # Docker 시작 시 자동 기동(수동 docker stop은 존중)

  # ----------------------------------------------------------
  # Kafka UI 대시보드 (로컬 개발용)
  # 브라우저 접속: http://localhost:8085
  # Kafka 접속: 컨테이너 네트워크 내부 리스너 shop-kafka:29092 사용
  # ----------------------------------------------------------
  shop-kafka-ui:
    image: provectuslabs/kafka-ui:${KAFKA_UI_IMAGE_TAG:-latest}
    container_name: shop-kafka-ui
    environment:
      TZ: Asia/Seoul                          # 컨테이너 시간대 KST(로그 타임스탬프 기준)
      KAFKA_CLUSTERS_0_NAME: local-shop
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: shop-kafka:29092
      DYNAMIC_CONFIG_ENABLED: "false"
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    depends_on:
      - shop-kafka
    networks:
      - shop-net
    restart: unless-stopped  # Docker 시작 시 자동 기동(수동 docker stop은 존중)

  # ----------------------------------------------------------
  # Redis 단일 노드 (로컬 개발 전용)
  # 호스트 게시: 6379
  # 로컬 전용 주의: AUTH/TLS 없음. 운영 보안/클러스터 구성을 가장하지 않는다.
  # DB index 분리: shop-core → database=0, notification → database=1 (앱 application.yml 참고)
  # ----------------------------------------------------------
  shop-redis:
    image: redis:${REDIS_IMAGE_TAG:-7.4-alpine}
    container_name: shop-redis
    environment:
      TZ: Asia/Seoul                          # 컨테이너 시간대 KST(로그 타임스탬프 기준)
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - shop-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shop-net
    restart: unless-stopped  # Docker 시작 시 자동 기동(수동 docker stop은 존중)

  # ----------------------------------------------------------
  # 검색 엔진(Elasticsearch + Nori) 단일 노드 — 로컬 개발 전용 (ADR-011 T1)
  # 호스트 게시: 9200 (앱이 localhost:9200로 접속)
  # 로컬 전용 주의: xpack security/TLS OFF. 운영 보안/멀티노드 구성을 가장하지 않는다(Redis 005 원칙).
  # Nori는 Dockerfile.search 빌드 시 analysis-nori 플러그인으로 내장(_cat/plugins로 확인).
  # 색인/매핑/쿼리는 후속 Task(T2+3/T4/T5+6) — 본 노드는 기동·연결·health up까지만.
  # ----------------------------------------------------------
  shop-search:
    build:
      context: .
      dockerfile: Dockerfile.search
      args:
        ES_IMAGE_TAG: ${ES_IMAGE_TAG:-8.15.3}
    image: shop-search:${ES_IMAGE_TAG:-8.15.3}     # 빌드 결과 태깅(버전 핀)
    container_name: shop-search
    environment:
      TZ: Asia/Seoul
      discovery.type: single-node                  # 단일 노드 클러스터
      xpack.security.enabled: "false"              # 로컬 보안 완화(AUTH/TLS off) — 운영 가장 금지
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}   # 로컬 힙 상한 보수적 고정(메모리 폭주 방지)
      bootstrap.memory_lock: "false"               # mlock 권한 없는 로컬 환경 부팅 안정성 보수값
      # CORS: elasticvue(shop-search-ui)는 브라우저 SPA라 호스트 브라우저에서 localhost:9200으로 직접 호출한다.
      # 브라우저 동일출처 정책상 ES가 CORS 헤더를 줘야 콘솔이 붙는다. 로컬 전용 + 보안 off라 전 출처 허용.
      # allow-origin 값은 "*" 금지 — ES 8.x가 env를 overrides.yml로 변환할 때 따옴표 없는 *가
      # YAML alias로 해석돼 기동이 깨진다. 정규식 형식 /.*/ (앞뒤 슬래시 = regex)로 전 출처 매칭한다.
      # (운영 가장 금지 — 운영에선 CORS·security 별도 정책. 로컬 개발 편의 한정.)
      http.cors.enabled: "true"
      http.cors.allow-origin: "/.*/"
    ports:
      - "${SHOP_CORE_SEARCH_PORT:-9200}:9200"      # 호스트 IDE 앱 접속(9300 transport는 단일노드라 미게시)
    volumes:
      - shop-search-data:/usr/share/elasticsearch/data
    healthcheck:
      # 단일 노드는 cluster status yellow가 정상(레플리카 미할당). yellow|green 둘 다 healthy로 인정.
      # ES 공식 이미지(8.x)에는 curl이 내장됨 — 검증 게이트 6 실측 확인.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s                            # ES 부팅이 느림 — PG·Redis(10s)보다 넉넉히
    networks:
      - shop-net
    restart: unless-stopped

  # ----------------------------------------------------------
  # Elasticsearch 웹 콘솔 — elasticvue (로컬 개발용)
  # 브라우저 접속: http://localhost:8086
  # 인덱스 목록·문서 브라우징·매핑·REST 쿼리 콘솔(_search/_analyze 등) 확인용.
  # 동작 구조: elasticvue는 정적 SPA — 컨테이너는 파일만 서빙하고 실제 ES 호출은
  #   호스트 브라우저 → localhost:9200 (컨테이너 네트워크 shop-search:9200 아님).
  #   따라서 ES에 http.cors.* 설정이 필요(위 shop-search 참조).
  # ELASTICVUE_CLUSTERS: 접속 대상을 미리 채워 둠(브라우저 기준 URI = localhost:9200).
  # ----------------------------------------------------------
  shop-search-ui:
    image: cars10/elasticvue:${ELASTICVUE_IMAGE_TAG:-latest}
    container_name: shop-search-ui
    environment:
      TZ: Asia/Seoul                          # 컨테이너 시간대 KST(로그 타임스탬프 기준)
      # 클러스터 사전 등록(JSON) — UI 첫 진입 시 연결 입력 생략. uri는 호스트 브라우저 기준.
      ELASTICVUE_CLUSTERS: '[{"name": "shop-search", "uri": "http://localhost:${SHOP_CORE_SEARCH_PORT:-9200}"}]'
    ports:
      - "${SHOP_SEARCH_UI_PORT:-8086}:8080"
    depends_on:
      - shop-search
    networks:
      - shop-net
    restart: unless-stopped  # Docker 시작 시 자동 기동(수동 docker stop은 존중)

# ----------------------------------------------------------
# Named Volumes (PostgreSQL 데이터 영속 + Redis 데이터 영속 + ES 데이터 영속)
# Kafka 로그는 임시(volume 없음) — 후보 A 자동 포맷으로 재기동 시 재포맷
# ----------------------------------------------------------
volumes:
  shop-core-pg-data:
    driver: local
  notification-pg-data:
    driver: local
  shop-redis-data:
    driver: local
  shop-search-data:
    driver: local

# ----------------------------------------------------------
# 사용자 정의 Bridge 네트워크
# 컨테이너 간 DNS 이름 해석 필요 (shop-kafka 등)
# ----------------------------------------------------------
networks:
  shop-net:
    driver: bridge
