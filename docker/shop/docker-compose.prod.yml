# ============================================================
# 운영 배포 Docker Compose — 단일 호스트 통합
# nginx(TLS 종단/LB) + shop-core×2(STATELESS JWT) + notification + 인프라 + certbot
# 로컬 dev(docker-compose.yml)와 별 파일. 같은 호스트 동시 기동 금지(컨테이너명/포트 충돌).
# 시크릿은 호스트 .env + secrets/kek.b64(bind mount). 둘 다 커밋 금지.
# 사용법:
#   1) .env 작성(.env.prod.example 참고), secrets/kek.b64 배치(Base64 AES-256)
#   2) ./scripts/init-letsencrypt.sh   # 최초 인증서 발급(닭-달걀 부트스트랩)
#   3) docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

# ---- shop-core 공통 정의(멀티 인스턴스 중복 제거 + 시크릿 동일 주입) ----
x-shop-core-common: &shop-core-common
  image: shop-core:${SHOP_IMAGE_TAG:-latest}
  environment: &shop-core-env
    TZ: Asia/Seoul                                       # 컨테이너·JVM 시간대 KST(로그·now() 기준)
    SHOP_CORE_DB_URL: jdbc:postgresql://shop-core-postgres:5432/${SHOP_CORE_DB_NAME:-shop_core}
    SHOP_CORE_DB_USERNAME: ${SHOP_CORE_DB_USER:?set in .env}
    SHOP_CORE_DB_PASSWORD: ${SHOP_CORE_DB_PASSWORD:?set in .env}
    SHOP_CORE_KAFKA_BOOTSTRAP: shop-kafka:29092          # INTERNAL 리스너(컨테이너간)
    SHOP_CORE_REDIS_HOST: shop-redis
    SHOP_CORE_REDIS_PORT: "6379"
    SHOP_CORE_REDIS_DB: "0"
    SHOP_SECURITY_JWT_SECRET: ${SHOP_SECURITY_JWT_SECRET:?set in .env}  # 전 replica 동일(앵커 1곳)
    SHOP_CRYPTO_KEK_FILE: /run/secrets/kek.b64           # 전 replica 동일 마운트 경로
    SHOP_APP_BASE_URL: https://${SHOP_DOMAIN:?set in .env}
    SHOP_STORAGE_TYPE: local
    SHOP_STORAGE_ROOT: /app/uploads
    SHOP_STORAGE_ASSET_BASE_URL: https://${SHOP_DOMAIN}
    SERVER_FORWARD_HEADERS_STRATEGY: framework           # nginx TLS 종단 → X-Forwarded-* 인식(Secure 쿠키/https URL)
  volumes:
    - ./secrets/kek.b64:/run/secrets/kek.b64:ro          # KEK read-only(운영자 호스트 배치)
    - prod-shop-uploads:/app/uploads                          # 정적 자산 공유(멀티 인스턴스)
  depends_on:
    shop-core-postgres:
      condition: service_healthy
    shop-redis:
      condition: service_healthy
    shop-kafka:
      condition: service_started
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 60s                                    # Flyway 마이그레이션·컨텍스트 로드 여유
  restart: unless-stopped
  networks:
    - shop-net

services:

  # ---------------- nginx (TLS 종단 + shop-core LB) ----------------
  shop-nginx:
    image: nginx:${NGINX_IMAGE_TAG:-1.27-alpine}
    container_name: shop-nginx
    environment:
      TZ: Asia/Seoul                                     # 컨테이너 시간대 KST(로그 타임스탬프 기준)
      SHOP_DOMAIN: ${SHOP_DOMAIN:?set in .env}           # default.conf.template envsubst 대상
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/options-ssl-nginx.conf:/etc/nginx/options-ssl-nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt          # 호스트 가시(인증서 — docker/shop/certbot/conf)
      - ./certbot/www:/var/www/certbot           # 호스트 가시(ACME 챌린지 webroot)
    # nginx 이미지 기본 entrypoint는 command 첫 인자가 'nginx'일 때만 envsubst(템플릿 렌더)를 실행한다.
    # reload 루프를 위해 command를 override하면 envsubst가 스킵되므로, 여기서 명시적으로 렌더한다.
    # ('$$SHOP_DOMAIN'만 치환 — nginx 런타임 변수 $host 등은 보존). 이후 6h마다 reload + foreground nginx.
    command:
      - /bin/sh
      - -c
      - |
        envsubst '$$SHOP_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
        while :; do sleep 6h & wait $${!}; nginx -s reload; done &
        exec nginx -g 'daemon off;'
    depends_on:
      shop-core-1:
        condition: service_started
      shop-core-2:
        condition: service_started
    restart: unless-stopped
    networks:
      - shop-net

  # ---------------- certbot (Let's Encrypt 발급/갱신 루프) ----------------
  shop-certbot:
    image: certbot/certbot:${CERTBOT_IMAGE_TAG:-latest}
    container_name: shop-certbot
    environment:
      TZ: Asia/Seoul                                     # 컨테이너 시간대 KST(로그 타임스탬프 기준)
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # 12h마다 갱신 시도(webroot 방식, nginx 무중단). 최초 발급은 init-letsencrypt.sh.
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    depends_on:
      shop-nginx:
        condition: service_started
    restart: unless-stopped
    networks:
      - shop-net

  # ---------------- shop-core 인스턴스 ×2 ----------------
  shop-core-1:
    <<: *shop-core-common
    container_name: shop-core-1
    build:
      context: ../../shop-core
      dockerfile: ../docker/shop/Dockerfile.shop-core

  shop-core-2:
    <<: *shop-core-common
    container_name: shop-core-2
    # build 없음 — shop-core-1이 빌드한 동일 image(shop-core:${SHOP_IMAGE_TAG}) 재사용

  # ---------------- notification (Kafka 컨슈머·메일, 외부 미노출) ----------------
  shop-notification:
    image: notification:${NOTIFICATION_IMAGE_TAG:-latest}
    container_name: shop-notification
    build:
      context: ../../notification
      dockerfile: ../docker/shop/Dockerfile.notification
    environment:
      TZ: Asia/Seoul                                     # 컨테이너·JVM 시간대 KST(로그·now() 기준)
      NOTIFICATION_DB_URL: jdbc:postgresql://shop-notification-postgres:5432/${NOTIFICATION_DB_NAME:-notification}
      NOTIFICATION_DB_USERNAME: ${NOTIFICATION_DB_USER:?set in .env}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?set in .env}
      NOTIFICATION_KAFKA_BOOTSTRAP: shop-kafka:29092
      NOTIFICATION_KAFKA_GROUP: notification
      NOTIFICATION_REDIS_HOST: shop-redis
      NOTIFICATION_REDIS_PORT: "6379"
      NOTIFICATION_REDIS_DB: "1"                          # shop-core(0)와 분리
      NOTIFICATION_MAIL_MODE: ${NOTIFICATION_MAIL_MODE:-smtp}   # 운영 실 SMTP
      NOTIFICATION_MAIL_FROM: ${NOTIFICATION_MAIL_FROM:-no-reply@${SHOP_DOMAIN}}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    depends_on:
      shop-notification-postgres:
        condition: service_healthy
      shop-redis:
        condition: service_healthy
      shop-kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - shop-net

  # ---------------- 인프라: shop-core PostgreSQL ----------------
  shop-core-postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16.4-alpine}
    container_name: shop-core-postgres
    environment:
      TZ: Asia/Seoul                                     # 컨테이너 시간대 KST(로그·now() 기준)
      POSTGRES_DB: ${SHOP_CORE_DB_NAME:-shop_core}
      POSTGRES_USER: ${SHOP_CORE_DB_USER:?set in .env}
      POSTGRES_PASSWORD: ${SHOP_CORE_DB_PASSWORD:?set in .env}
    ports:
      # 호스트 DB 툴 접속용. 기본은 127.0.0.1 바인딩(호스트 전용 — 외부망 비노출).
      # 외부 노출이 필요하면 .env에 SHOP_CORE_DB_HOST_PORT=5432(0.0.0.0) 또는 0.0.0.0:5432 지정.
      - "${SHOP_CORE_DB_HOST_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - prod-shop-core-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${SHOP_CORE_DB_USER:-shop_core}", "-d", "${SHOP_CORE_DB_NAME:-shop_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - shop-net

  # ---------------- 인프라: notification PostgreSQL ----------------
  shop-notification-postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-16.4-alpine}
    container_name: shop-notification-postgres
    environment:
      TZ: Asia/Seoul                                     # 컨테이너 시간대 KST(로그·now() 기준)
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notification}
      POSTGRES_USER: ${NOTIFICATION_DB_USER:?set in .env}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?set in .env}
    ports:
      # 호스트 DB 툴 접속용. 기본 127.0.0.1 바인딩(호스트 전용). 호스트 5433 → 컨테이너 5432.
      - "${NOTIFICATION_DB_HOST_PORT:-127.0.0.1:5433}:5432"
    volumes:
      - prod-notification-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${NOTIFICATION_DB_USER:-notification}", "-d", "${NOTIFICATION_DB_NAME:-notification}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - shop-net

  # ---------------- 인프라: Kafka (KRaft 단일 노드, 영속 볼륨) ----------------
  shop-kafka:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-3.8.1}
    container_name: shop-kafka
    environment:
      TZ: Asia/Seoul                                     # 컨테이너 시간대 KST(로그 타임스탬프 기준)
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@shop-kafka:9093
      # INTERNAL(컨테이너간)만 사용 — 운영은 호스트 EXTERNAL 게시 안 함
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://shop-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"            # 운영: 토픽 자동생성 비활성(명시 생성)
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - prod-kafka-data:/var/lib/kafka/data                    # 이벤트 로그 영속(운영)
    # 호스트 포트 미게시 — 내부망만(공격 표면 축소)
    restart: unless-stopped
    networks:
      - shop-net

  # ---------------- 인프라: Redis (shop-core DB0 / notification DB1) ----------------
  shop-redis:
    image: redis:${REDIS_IMAGE_TAG:-7.4-alpine}
    container_name: shop-redis
    environment:
      TZ: Asia/Seoul                                     # 컨테이너 시간대 KST(로그 타임스탬프 기준)
    volumes:
      - prod-shop-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - shop-net

volumes:
  prod-shop-core-pg-data:
    driver: local
  prod-notification-pg-data:
    driver: local
  prod-shop-redis-data:
    driver: local
  prod-kafka-data:
    driver: local
  prod-shop-uploads:
    driver: local
  # 인증서/webroot는 named 볼륨 대신 host bind mount(./certbot/conf, ./certbot/www) — 호스트 가시·백업 용이

networks:
  shop-net:
    driver: bridge
